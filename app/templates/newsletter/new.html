{% extends "base.html" %}

{% block content %}
<div class="max-w-lg mx-auto">
    <div class="mb-4">
        <a href="{{ url_for('newsletter.index', publication_id=current_publication.id) }}" class="text-blue-600 hover:underline">&larr; Back to Newsletters</a>
    </div>

    <div class="bg-white shadow-md rounded-lg p-8">
        <h1 class="text-2xl font-bold mb-6">New Newsletter</h1>
        <p class="text-gray-600 mb-6">Publication: <strong>{{ current_publication.name }}</strong></p>

        {% if templates %}
        <form method="POST" action="{{ url_for('newsletter.new', publication_id=current_publication.id) }}">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div class="mb-4">
                <label for="name" class="block text-gray-700 font-bold mb-2">Newsletter Name</label>
                <input type="text" id="name" name="name" required placeholder="e.g. Week of March 3"
                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
            </div>

            <div class="mb-6">
                <label for="template_id" class="block text-gray-700 font-bold mb-2">Template</label>
                <select id="template_id" name="template_id" required
                        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500">
                    <option value="">-- Select Template --</option>
                    {% for t in templates %}
                    <option value="{{ t.id }}">{{ t.name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="flex space-x-2">
                <button type="submit" class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">
                    Create Newsletter
                </button>
                <a href="{{ url_for('newsletter.index', publication_id=current_publication.id) }}"
                   class="px-6 py-2 bg-gray-300 text-gray-700 rounded hover:bg-gray-400">
                    Cancel
                </a>
            </div>
        </form>
        {% else %}
        <div class="text-center text-gray-500 py-6">
            <p>No newsletter templates available for this publication.</p>
            <p class="text-sm mt-2">Ask an admin to create a template first.</p>
        </div>
        {% endif %}
    </div>
</div>
{% endblock %}
